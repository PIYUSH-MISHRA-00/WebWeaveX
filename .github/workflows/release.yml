name: Release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build core

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Build Node package
        working-directory: sdk/node
        run: npm pack

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Build Dart package
        working-directory: sdk/dart
        run: dart pub get

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build Java package
        run: mvn -f sdk/java/pom.xml clean package -DskipTests

      - name: Build Kotlin package
        run: mvn -f sdk/kotlin/pom.xml clean package -DskipTests
