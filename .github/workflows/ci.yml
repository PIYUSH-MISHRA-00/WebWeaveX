name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Bytecode compile check
        run: PYTHONDONTWRITEBYTECODE=1 python -m compileall -q .

      - name: Build distribution
        run: |
          python -m pip install build
          python -m build .

  node:
    name: Node
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/node/package-lock.json

      - name: Install dependencies
        working-directory: sdk/node
        run: npm ci

      - name: SDK load check
        working-directory: sdk/node
        run: node -e "const sdk=require('./index.js'); console.log(Object.keys(sdk).length);"

      - name: Build npm package
        working-directory: sdk/node
        run: npm pack

  dart:
    name: Dart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Resolve dependencies
        working-directory: sdk/dart
        run: dart pub get

      - name: Analyze SDK
        working-directory: sdk/dart
        run: dart analyze lib bin

      - name: Publish dry-run
        working-directory: sdk/dart
        run: dart pub publish --dry-run

  java:
    name: Java
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Build Java SDK
        run: mvn -f sdk/java/pom.xml clean install -DskipTests

  kotlin:
    name: Kotlin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Build Kotlin SDK
        run: mvn -f sdk/kotlin/pom.xml clean install -DskipTests
